info:
  name: Update Resume
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{BASE_URL}}/api/resumes/{{resumeId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "label": "Full Stack Resume",
        "isDefault": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
