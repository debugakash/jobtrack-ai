info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/api/auth/register"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "firstName": "Bruno",
        "lastName": "Mars",
        "email": "bruno.mars@gmail.com",
        "password": "PasswordBruno123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
